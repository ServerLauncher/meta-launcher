name: Update Meta

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout meta-launcher
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout meta
        uses: actions/checkout@v4
        with:
          repository: ServerLauncher/meta
          path: meta

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r meta/requirements.txt

      - name: Run generator
        run: |
          cd meta
          python -m meta.run.run

      - name: Copy generated files
        run: cp -r meta/dist/* ./

      - name: Cleanup
        run: rm -rf meta

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
